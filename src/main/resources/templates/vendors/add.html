<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Vendor - Wedding Planning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h3>💍 Add New Vendor</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/vendors/save}" th:object="${vendor}" method="post">
                <div class="mb-3">
                    <label class="form-label">Vendor Name</label>
                    <input type="text" class="form-control" th:field="*{name}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Vendor Type</label>
                    <select class="form-control" th:field="*{vendorType}" required>
                        <option value="">-- Select Type --</option>
                        <option value="Photographer">Photographer</option>
                        <option value="Caterer">Caterer</option>
                        <option value="Florist">Florist</option>
                        <option value="DJ">DJ</option>
                        <option value="Decorator">Decorator</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" th:field="*{phone}" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Price (LKR)</label>
                    <input type="number" class="form-control" th:field="*{price}" required/>
                </div>
                <button type="submit" class="btn btn-danger">Save Vendor</button>
                <a href="/vendors" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
