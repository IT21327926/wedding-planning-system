<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendors - Wedding Planning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-danger">💍 Wedding Vendors</h1>
        <a href="/vendors/new" class="btn btn-danger">+ Add Vendor</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Price (LKR)</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendor : ${vendors}">
            <td th:text="${vendor.id}"></td>
            <td th:text="${vendor.name}"></td>
            <td th:text="${vendor.vendorType}"></td>
            <td th:text="${vendor.email}"></td>
            <td th:text="${vendor.phone}"></td>
            <td th:text="${vendor.price}"></td>
            <td>
                <a th:href="@{/vendors/edit/{id}(id=${vendor.id})}"
                   class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/vendors/delete/{id}(id=${vendor.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
