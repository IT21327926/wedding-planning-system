<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Forever Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
            url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1600') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
        }
        .register-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .register-title {
            font-family: 'Playfair Display', serif;
            color: #333;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 5px;
        }
        .register-subtitle {
            text-align: center;
            color: #c8a97e;
            letter-spacing: 2px;
            font-size: 0.85rem;
            margin-bottom: 35px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0d5c5;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #c8a97e;
            box-shadow: 0 0 0 0.2rem rgba(200,169,126,0.25);
        }
        .form-label {
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .btn-wedding {
            background-color: #c8a97e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-wedding:hover {
            background-color: #b8956a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(200,169,126,0.4);
        }
        .login-link {
            text-align: center;
            color: #555;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .login-link a {
            color: #c8a97e;
            text-decoration: none;
            font-weight: 700;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .brand-link {
            text-align: center;
            margin-bottom: 25px;
        }
        .brand-link a {
            font-family: 'Playfair Display', serif;
            color: #c8a97e;
            text-decoration: none;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
<div class="register-card">
    <div class="brand-link">
        <a href="/">💍 Forever Events</a>
    </div>
    <h2 class="register-title">Create Account</h2>
    <p class="register-subtitle">✦ START PLANNING YOUR DREAM WEDDING ✦</p>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-user me-2"></i>Full Name</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter your full name" required/>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email" required/>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-phone me-2"></i>Phone Number</label>
            <input type="text" class="form-control" th:field="*{phone}" placeholder="Enter your phone number" required/>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="Create a password" required/>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="fas fa-lock me-2"></i>Confirm Password</label>
            <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm your password" required/>
        </div>
        <button type="submit" class="btn btn-wedding">
            <i class="fas fa-user-plus me-2"></i>Create Account
        </button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Sign in here</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
