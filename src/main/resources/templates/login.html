<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Forever Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
            url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1600') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            color: #333;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 5px;
        }
        .login-subtitle {
            text-align: center;
            color: #c8a97e;
            letter-spacing: 2px;
            font-size: 0.85rem;
            margin-bottom: 35px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0d5c5;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #c8a97e;
            box-shadow: 0 0 0 0.2rem rgba(200,169,126,0.25);
        }
        .form-label {
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .btn-wedding {
            background-color: #c8a97e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-wedding:hover {
            background-color: #b8956a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(200,169,126,0.4);
        }
        .divider {
            text-align: center;
            color: #aaa;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0d5c5;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .register-link {
            text-align: center;
            color: #555;
            font-size: 0.9rem;
        }
        .register-link a {
            color: #c8a97e;
            text-decoration: none;
            font-weight: 700;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .brand-link {
            text-align: center;
            margin-bottom: 25px;
        }
        .brand-link a {
            font-family: 'Playfair Display', serif;
            color: #c8a97e;
            text-decoration: none;
            font-size: 1.3rem;
        }
        .alert-danger {
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-link">
        <a href="/">💍 Forever Events</a>
    </div>
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">✦ SIGN IN TO YOUR ACCOUNT ✦</p>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password!
    </div>
    <div th:if="${logout}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>You have been logged out successfully!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your email" required/>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn btn-wedding">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
    </form>

    <div class="divider">or</div>

    <div class="register-link">
        Don't have an account? <a href="/register">Register here</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
